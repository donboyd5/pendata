project:
  type: book

execute:
  eval: true
  echo: true
  output: true
  freeze: auto # auto: during global project renders, re-render only when source changes

book:
  title: "Non-system data"
  author: "Don Boyd"
  date: today
  date-format: long
  chapters:
    - index.qmd
    - part: "Society of Actuaries"
      chapters:
      - soa/soa_mortality_rates.qmd
      - soa/soa_mortality_improvement.qmd

# bibliography: references.bib

# avoid the need to install to get the latest data under a short name
# devtools::load_all("./")
# mp3 <- pendata::mp1

format:
  html:
    theme: cosmo
    code-fold: true
  # pdf:
  #   documentclass: scrreprt

editor_options:
  chunk_output_type: console


