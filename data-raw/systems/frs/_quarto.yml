project:
  type: book

book:
  title: "Florida Retirement System data"
  author: "Don Boyd"
  date: today
  date-format: long
  chapters:
    - index.qmd
    - constants.qmd
    - part: "Stand-alone items (only requiring access to frs_constants)"
      chapters:
      - init_funding_data.qmd
      - retiree_distribution.qmd
      - salary.qmd
      - salary_growth.qmd
    - part: "Data that depend on SOA data"
      chapters:
        - mortality_improvement.qmd
    #   chapters:
    #   -

# bibliography: references.bib

# devtools::load_all("./")

format:
  html:
    theme: cosmo
    code-fold: true
  # pdf:
