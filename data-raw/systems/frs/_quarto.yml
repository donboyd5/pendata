project:
  type: book

execute:
  eval: true
  echo: true
  output: true
  freeze: false  # auto: during global project renders, re-render only when source changes

book:
  title: "Florida Retirement System data"
  author: "Don Boyd"
  date: today
  date-format: long
  chapters:
    - index.qmd
    - constants.qmd
    - part: "Stand-alone items (only requiring access to frs_constants)"
      chapters:
      - current_amort_layers.qmd
      - init_funding_data.qmd
      - headcount.qmd
      - retiree_distribution.qmd
      - retirement_rates.qmd
      - salary.qmd
      - salary_growth.qmd
    - part: "Data that depend on previously created data"
      chapters:
      - base_mortality_rates.qmd
      - mortality_improvement.qmd
      - termination_rates.qmd
    - part: "Assemble list of data for package"
      chapters:
      - assemble_list.qmd

# bibliography: references.bib

# devtools::load_all("./")

# from pendata folder, in powershell, enter ./runall.bat

format:
  html:
    theme: cosmo
    code-fold: true
  # pdf:
  #   documentclass: scrreprt

editor_options:
  chunk_output_type: console


