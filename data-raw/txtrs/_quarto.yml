project:
  type: book
  output-dir: _txtrs

execute:
  eval: true
  echo: true
  output: false
  freeze: false  # auto: during global project renders, re-render only when source changes

format:
  html:
    theme: cosmo
    code-fold: true

editor:
  console: true
  markdown:
    canonical: true

editor_options:
  chunk_output_type: console    

book:
  title: "Texas TRS"
  author: "Don Boyd and Gang Chen"
  date: today
  date-format: long
  sidebar:
    collapse-level: 1
  chapters:
    - index.qmd # index.qmd must be in the quarto project root folder
    - create_stacked_txtrs_tables.qmd
